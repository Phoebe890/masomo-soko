# --- APPLICATION CONFIG ---
spring.application.name=eduhub-backend
server.port=${PORT:8080}

# --- DATABASE (Supabase/PostgreSQL) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pooling (HikariCP)
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=EduHubHikariCP
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# --- JPA / HIBERNATE ---
# 1. Update schema on first run, change to 'validate' later
spring.jpa.hibernate.ddl-auto=update
# 2. Force Postgres Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# 3. FIX for the NullPointerException (Critical for Supabase)
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
# 4. Performance settings
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- FILE UPLOADS ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- SESSION & COOKIES ---
server.servlet.session.cookie.name=JSESSIONID
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=none
server.servlet.session.timeout=30m


 server.servlet.session.cookie.domain=masomosoko.co.ke

